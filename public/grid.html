<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; }
  .container { position: relative; display: inline-block; }
  .grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(20, 1fr);
  }
  .cell {
    border: 1px solid red; color: yellow; font-size: 10px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3); text-shadow: 1px 1px 2px black;
  }
</style>
</head>
<body>
  <div class="container">
    <img src="rocket.png" style="width: 1000px;" />
    <div class="grid" id="grid"></div>
  </div>
  <script>
    const grid = document.getElementById('grid');
    for (let r = 0; r < 20; r++) {
      for (let c = 0; c < 20; c++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.innerText = `${c},${r}`;
        grid.appendChild(div);
      }
    }
  </script>
</body>
</html>
